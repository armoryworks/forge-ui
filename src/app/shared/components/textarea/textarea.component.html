<mat-form-field appearance="outline" [class.app-readonly-field]="isReadonly()">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  <textarea matInput
    [rows]="rows()"
    [attr.maxlength]="maxlength()"
    [attr.placeholder]="placeholder() || null"
    [readonly]="isReadonly()"
    [disabled]="disabled()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="markTouched()">
  </textarea>
  @if (hint()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
</mat-form-field>
