@if (visibleAnnouncements().length > 0) {
  <div class="announcement-overlay">
    @for (group of visibleAnnouncements(); track group.representative.id) {
      <div class="announcement" [class]="getSeverityClass(group.representative.severity)">
        <span class="material-icons-outlined announcement__icon">{{ getSeverityIcon(group.representative.severity) }}</span>
        <div class="announcement__content">
          <span class="announcement__title">
            {{ group.representative.title }}
            @if (group.count > 1) {
              <span class="announcement__count">×{{ group.count }}</span>
            }
          </span>
          <span class="announcement__message">{{ group.representative.content }}</span>
        </div>
        <div class="announcement__actions">
          <button class="action-btn action-btn--sm announcement__ack-btn" (click)="acknowledge(group)" data-testid="announcement-ack-btn">
            <span class="material-icons-outlined">check</span>
            {{ group.representative.requiresAcknowledgment ? 'I Understand' : 'Acknowledge' }}
            @if (group.count > 1) {
              <span>All ({{ group.count }})</span>
            }
          </button>
        </div>
      </div>
    }
  </div>
}
