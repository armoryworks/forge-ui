<mat-form-field appearance="outline" class="currency-input">
  <mat-label>{{ label() }}</mat-label>
  <span matTextPrefix class="currency-input__symbol" aria-hidden="true">{{ currencySymbol() }}&nbsp;</span>
  <input matInput
    type="number"
    inputmode="decimal"
    [placeholder]="placeholder()"
    [required]="required()"
    [attr.min]="min()"
    [attr.max]="max()"
    [attr.step]="step()"
    [disabled]="disabled()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="markTouched()" />
</mat-form-field>
