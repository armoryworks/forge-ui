<mat-form-field appearance="outline" [class.app-readonly-field]="isReadonly()">
  <mat-label>{{ label() }}</mat-label>
  <input matInput
    [matDatepicker]="picker"
    [formControl]="internalControl"
    [min]="min()"
    [max]="max()"
    [required]="required()"
    [readonly]="isReadonly()"
    (blur)="markTouched()" />
  <mat-datepicker-toggle matSuffix [for]="picker" [disabled]="isReadonly() || internalControl.disabled" />
  <mat-datepicker #picker />
</mat-form-field>
