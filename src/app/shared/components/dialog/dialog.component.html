<!-- Backdrop is non-interactive — clicking it does NOT close the dialog
     (per Dan, CDK overlay area should not dismiss work-in-progress).
     Users close via the header X button or an explicit footer button.
     The backdrop stays as a visual scrim only. -->
<div class="dialog-backdrop">
  <div class="dialog" role="dialog" aria-modal="true" [attr.aria-label]="title()" [style.width]="width()" [class.dialog--split]="splitLayout()">
    <div class="dialog__header">
      <span class="dialog__title">{{ title() }}</span>
      @if (isDraftEnabled()) {
        <app-dirty-form-indicator [dirty]="isDirty()" />
      }
      <button class="icon-btn" [attr.aria-label]="'shared.closeDialog' | translate" [matTooltip]="'shared.closeDialog' | translate" matTooltipPosition="above" (click)="tryClose()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>
    <div class="dialog__body">
      @if (isDraftEnabled() && restoredDraftTimestamp() !== null) {
        <app-draft-recovery-banner
          [visible]="true"
          [timestamp]="restoredDraftTimestamp()!"
          (discarded)="discardDraft()" />
      }
      <ng-content />
    </div>
    <div class="dialog__footer">
      <ng-content select="[dialog-footer]" />
    </div>
  </div>
</div>
