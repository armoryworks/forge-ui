@if (panelOpen()) {
  @if (!isRoutedPage()) {
    <div class="chat-backdrop" role="button" tabindex="0" [attr.aria-label]="'chat.closeChat' | translate" (click)="toggle()" (keydown.enter)="toggle()"></div>
  }
  <div class="chat-panel" [class.chat-panel--page]="isRoutedPage()">
    @if (view() === 'list') {
      <!-- List header -->
      <div class="chat-panel__header">
        <span class="chat-panel__header-title">{{ 'chat.title' | translate }}</span>
        <span class="chat-panel__spacer"></span>
        @if (!isRoutedPage()) {
          <button class="icon-btn" (click)="popOut()" aria-label="Pop out chat" matTooltip="Pop out" matTooltipPosition="above">
            <span class="material-icons-outlined">open_in_new</span>
          </button>
          <button class="icon-btn" (click)="toggle()" [attr.aria-label]="'chat.closeChat' | translate" [matTooltip]="'chat.closeChat' | translate" matTooltipPosition="above">
            <span class="material-icons-outlined">close</span>
          </button>
        }
      </div>

      <app-chat-channel-list
        [conversations]="conversations()"
        [channels]="channels()"
        [selectedChannelId]="selectedChannelId()"
        [selectedUserId]="selectedUserId()"
        (channelSelected)="onChannelSelected($event)"
        (newGroup)="openCreateChannel()"
        (browseChannels)="openBrowseChannels()"
        (muteToggled)="onMuteToggled($event)" />
    } @else {
      <!-- Conversation/channel header -->
      <app-chat-channel-header
        [conversation]="selectedConversation()"
        [channel]="selectedChannel()"
        [showBack]="true"
        [showPopout]="!isRoutedPage()"
        [showClose]="!isRoutedPage()"
        (backClicked)="backToList()"
        (settingsClicked)="openChannelSettings()"
        (muteToggled)="onHeaderMuteToggled($event)"
        (popoutClicked)="popOut()"
        (closeClicked)="toggle()" />

      <div class="chat-panel__content-area" [class.chat-panel__content-area--threaded]="threadParentMessage()">
        <app-chat-message-area
          #messageArea
          [messages]="messages()"
          [currentUserId]="currentUserId()"
          [isChannel]="isChannel()"
          [isReadOnly]="isReadOnly()"
          [showFileAttach]="isChannel()"
          [pendingFile]="pendingFile()"
          [pendingFileAttachmentId]="pendingFileAttachmentId()"
          [isUploading]="isUploading()"
          (messageSent)="onMessageSent($event)"
          (threadOpened)="onThreadOpened($event)"
          (fileSelected)="onFileSelected($event)"
          (fileCancelled)="onFileCancelled()" />

        @if (threadParentMessage(); as parent) {
          <app-chat-thread-panel
            [parentMessage]="parent"
            [replies]="threadReplies()"
            (replySent)="onThreadReplySent($event)"
            (closed)="closeThread()" />
        }
      </div>
    }
  </div>
}
