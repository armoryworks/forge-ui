<app-page-layout [pageTitle]="'admin.leadSources.title' | translate">
  <ng-container toolbar>
    <app-toolbar>
      <span class="toolbar__hint">{{ 'admin.leadSources.hint' | translate }}</span>
      <span appSpacer></span>
      <button class="action-btn action-btn--create" (click)="openNew()" data-testid="lead-source-new-btn">
        <span class="material-icons-outlined">add</span>
        {{ 'admin.leadSources.newSource' | translate }}
      </button>
    </app-toolbar>
  </ng-container>

  <ng-container content>
    <div [appLoadingBlock]="loading()">
      <app-data-table
        tableId="admin-lead-sources"
        [columns]="columns"
        [data]="sources()"
        emptyIcon="campaign"
        [emptyMessage]="'admin.leadSources.empty' | translate">

        <ng-template appColumnCell="qualityScore" let-row>
          <span class="quality-score" [class.quality-score--good]="row.qualityScore >= 70"
            [class.quality-score--warn]="row.qualityScore < 70 && row.qualityScore >= 40"
            [class.quality-score--bad]="row.qualityScore < 40">
            {{ row.qualityScore }}
          </span>
        </ng-template>

        <ng-template appColumnCell="isActive" let-row>
          @if (row.isActive) {
            <span class="chip chip--success">{{ 'common.active' | translate }}</span>
          } @else {
            <span class="chip chip--muted">{{ 'common.inactive' | translate }}</span>
          }
        </ng-template>

        <ng-template appColumnCell="createdAt" let-row>
          {{ row.createdAt | date:'MM/dd/yyyy' }}
        </ng-template>

        <ng-template appColumnCell="actions" let-row>
          <button class="icon-btn" [attr.aria-label]="'common.edit' | translate"
                  (click)="openEdit($any(row))" data-testid="lead-source-edit-btn">
            <span class="material-icons-outlined">edit</span>
          </button>
          <button class="icon-btn icon-btn--danger" [attr.aria-label]="'common.delete' | translate"
                  (click)="confirmDelete($any(row))" data-testid="lead-source-delete-btn">
            <span class="material-icons-outlined">delete</span>
          </button>
        </ng-template>
      </app-data-table>
    </div>
  </ng-container>
</app-page-layout>

@if (showDialog()) {
  <app-dialog
    [title]="(editingId() === null ? 'admin.leadSources.newSource' : 'admin.leadSources.editSource') | translate"
    width="480px"
    (closed)="close()">
    <div [formGroup]="form">
      <app-input [label]="'admin.leadSources.fieldName' | translate"
        formControlName="name" [required]="true"
        [placeholder]="'admin.leadSources.namePlaceholder' | translate"
        data-testid="lead-source-name" />
      <app-input [label]="'admin.leadSources.fieldCode' | translate"
        formControlName="code" [required]="true"
        [placeholder]="'admin.leadSources.codePlaceholder' | translate"
        data-testid="lead-source-code" />
      <app-textarea [label]="'admin.leadSources.fieldDescription' | translate"
        formControlName="description"
        [rows]="3" [maxlength]="500"
        data-testid="lead-source-description" />
      @if (editingId() !== null) {
        <app-toggle [label]="'common.active' | translate"
          formControlName="isActive"
          data-testid="lead-source-active" />
      }
    </div>
    <div dialog-footer>
      <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary"
          [disabled]="form.invalid || saving()"
          (click)="save()"
          data-testid="lead-source-save-btn">
          <span class="material-icons-outlined">save</span>
          {{ 'common.save' | translate }}
        </button>
      </app-validation-button>
    </div>
  </app-dialog>
}
