<app-dialog
  [title]="isEditing ? ('salesTax.editRate' | translate) : ('salesTax.addRate' | translate)"
  width="480px"
  [draftConfig]="draftConfig"
  [draftFormGroup]="form"
  (closed)="close()">

  <div [formGroup]="form">
    <div class="dialog-row">
      <app-input label="Name" formControlName="name" [required]="true"
        [attr.aria-label]="'salesTax.fieldName' | translate" />
      <app-input label="Code" formControlName="code" [required]="true"
        placeholder="e.g. CA-SALES"
        [attr.aria-label]="'salesTax.fieldCode' | translate" />
    </div>

    <div class="dialog-row">
      <app-select label="State" formControlName="stateCode" [options]="stateOptions"
        aria-label="State code" />
      <app-input
        label="Rate (%)"
        type="number"
        formControlName="ratePercent"
        [required]="true"
        placeholder="e.g. 8.25"
        [attr.aria-label]="'salesTax.fieldRate' | translate" />
    </div>

    <app-datepicker label="Effective From" formControlName="effectiveFrom" aria-label="Effective from date" />

    <app-textarea
      label="Description (optional)"
      formControlName="description"
      [rows]="2"
      [attr.aria-label]="'salesTax.fieldDescription' | translate" />

    <app-toggle
      label="Set as default rate"
      formControlName="isDefault"
      [attr.aria-label]="'salesTax.fieldDefault' | translate" />

    <!-- Phase 3 F5 — full-record fields. exemptFlag flags this row as an
         exemption marker (local concern); glPostingAccount is optional and
         populated by the external accounting sync when configured. -->
    <app-toggle
      label="Exempt rate"
      formControlName="exemptFlag"
      data-testid="sales-tax-exempt-flag" />

    <app-input
      label="GL Posting Account (optional)"
      formControlName="glPostingAccount"
      placeholder="e.g. 2200-Sales-Tax"
      data-testid="sales-tax-gl-posting-account" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <app-validation-button [violations]="violations" [loading]="saving()">
    <button class="action-btn action-btn--primary"
      [disabled]="form.invalid || saving()"
      (click)="save()">
      @if (saving()) {
        <span class="material-icons-outlined account-page__spinner">sync</span>
      } @else {
        <span class="material-icons-outlined">save</span>
      }
      {{ 'common.save' | translate }}
    </button>
    </app-validation-button>
  </div>
</app-dialog>
