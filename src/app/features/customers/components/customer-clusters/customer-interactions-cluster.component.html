<div class="tab-toolbar">
  <app-select
    [label]="'customers.interactions.filterContact' | translate"
    [formControl]="contactFilterControl"
    [options]="contactOptions()" />
  <app-select
    [label]="'customers.interactions.filterType' | translate"
    [formControl]="typeFilterControl"
    [options]="typeOptions" />
  <span class="tab-toolbar__spacer"></span>
  <button class="action-btn action-btn--create" data-testid="log-interaction-btn" (click)="openCreate()"
          [attr.aria-label]="'customers.interactions.logInteractionAriaLabel' | translate">
    <span class="material-icons-outlined">add</span>
    {{ 'customers.interactions.logInteraction' | translate }}
  </button>
</div>

<div class="tab-content tab-content--table" [appLoadingBlock]="loading()">
  <app-data-table
    tableId="customer-interactions"
    [columns]="columns"
    [data]="interactions()"
    emptyIcon="forum"
    [emptyMessage]="'customers.interactions.noInteractions' | translate">
    <ng-template appColumnCell="type" let-row>
      <span class="chip">
        <span class="material-icons-outlined chip__icon">{{ typeIcon(row.type) }}</span>
        {{ ('customers.interactions.types.' + row.type) | translate }}
      </span>
    </ng-template>
    <ng-template appColumnCell="interactionDate" let-row>
      {{ row.interactionDate | date:'MM/dd/yyyy' }}
    </ng-template>
    <ng-template appColumnCell="durationMinutes" let-row>
      {{ formatDuration(row.durationMinutes) }}
    </ng-template>
    <ng-template appColumnCell="actions" let-row>
      <div class="row-actions">
        <button class="icon-btn"
                [attr.aria-label]="'customers.interactions.editInteractionAriaLabel' | translate"
                (click)="openEdit(row); $event.stopPropagation()">
          <span class="material-icons-outlined">edit</span>
        </button>
        <button class="icon-btn icon-btn--danger"
                [attr.aria-label]="'customers.interactions.deleteInteractionAriaLabel' | translate"
                (click)="deleteInteraction(row); $event.stopPropagation()">
          <span class="material-icons-outlined">delete</span>
        </button>
      </div>
    </ng-template>
  </app-data-table>
</div>

<!-- Log/Edit Interaction Dialog -->
@if (showDialog()) {
  <app-dialog [title]="(editingId() ? 'customers.interactions.editInteraction' : 'customers.interactions.logInteraction') | translate"
              width="520px" (closed)="closeDialog()">
    <div [formGroup]="form">
      <div class="dialog-row">
        <app-select data-testid="interaction-type" [label]="'customers.interactions.type' | translate"
                    formControlName="type" [options]="formTypeOptions" [required]="true" />
        <app-select data-testid="interaction-contact" [label]="'customers.interactions.contact' | translate"
                    formControlName="contactId" [options]="contactOptions()" />
      </div>
      <app-input data-testid="interaction-subject" [label]="'customers.interactions.subject' | translate"
                 formControlName="subject" [maxlength]="200" [required]="true" />
      <div class="dialog-row">
        <app-datepicker data-testid="interaction-date" [label]="'customers.interactions.date' | translate"
                        formControlName="interactionDate" [required]="true" />
        <app-input data-testid="interaction-duration" [label]="'customers.interactions.durationMinutes' | translate"
                   type="number" formControlName="durationMinutes" />
      </div>
      <app-textarea data-testid="interaction-body" [label]="'customers.interactions.notes' | translate"
                    formControlName="body" [rows]="4" />
    </div>

    <div dialog-footer>
      <button class="action-btn" (click)="closeDialog()">{{ 'common.cancel' | translate }}</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
      <button class="action-btn action-btn--primary" data-testid="interaction-save-btn"
        [disabled]="form.invalid || saving()"
        (click)="save()">
        <span class="material-icons-outlined">save</span>
        {{ (editingId() ? 'customers.interactions.saveChanges' : 'customers.interactions.logInteraction') | translate }}
      </button>
      </app-validation-button>
    </div>
  </app-dialog>
}
