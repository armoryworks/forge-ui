<div class="tab-content" [appLoadingBlock]="loading()">
  <div class="documents-section">
    @for (doc of documents(); track doc.id) {
      <div class="doc-item">
        <span class="material-icons-outlined doc-item__icon">{{ getFileIcon(doc.contentType) }}</span>
        <div class="doc-item__info">
          <span class="doc-item__name">{{ doc.fileName }}</span>
          <span class="doc-item__meta">{{ formatFileSize(doc.size) }} · {{ doc.createdAt | date:'MM/dd/yyyy' }}</span>
        </div>
        <button class="icon-btn" [attr.aria-label]="'common.download' | translate" (click)="downloadFile(doc)">
          <span class="material-icons-outlined">download</span>
        </button>
        <button class="icon-btn icon-btn--danger" [attr.aria-label]="'common.delete' | translate" (click)="deleteFile(doc)">
          <span class="material-icons-outlined">delete</span>
        </button>
      </div>
    }
    <app-file-upload-zone
      entityType="customers"
      [entityId]="customerId()"
      accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.csv,.txt"
      [maxSizeMb]="50"
      (uploaded)="onFileUploaded($event)" />
  </div>
</div>
