<app-dialog [title]="title()" width="520px" [dirty]="form.dirty" (closed)="close()">
  <div [formGroup]="form">
    <div class="dialog-row">
      <app-select data-testid="interaction-type" [label]="'customers.interactions.type' | translate"
                  formControlName="type" [options]="formTypeOptions" [required]="true" />
      <app-select data-testid="interaction-contact" [label]="'customers.interactions.contact' | translate"
                  formControlName="contactId" [options]="contactOptions()" />
    </div>
    <app-input data-testid="interaction-subject" [label]="'customers.interactions.subject' | translate"
               formControlName="subject" [maxlength]="200" [required]="true" />
    <div class="dialog-row">
      <app-datepicker data-testid="interaction-date" [label]="'customers.interactions.date' | translate"
                      formControlName="interactionDate" [required]="true" [max]="today" />
      <app-input data-testid="interaction-duration" [label]="'customers.interactions.durationMinutes' | translate"
                 type="number" formControlName="durationMinutes" />
    </div>
    <app-textarea data-testid="interaction-body" [label]="'customers.interactions.notes' | translate"
                  formControlName="body" [rows]="4" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <app-validation-button [violations]="violations" [loading]="saving()">
      <button class="action-btn action-btn--primary" data-testid="interaction-save-btn"
        [disabled]="form.invalid || saving()"
        (click)="save()">
        <span class="material-icons-outlined">save</span>
        {{ (isEdit ? 'customers.interactions.saveChanges' : 'customers.interactions.logInteraction') | translate }}
      </button>
    </app-validation-button>
  </div>
</app-dialog>
