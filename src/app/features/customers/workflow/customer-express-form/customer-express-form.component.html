<section class="customer-workflow-step" [appLoadingBlock]="saving()" data-testid="customer-express-form">
  <header class="customer-workflow-step__header">
    <h2 class="customer-workflow-step__title">{{ 'customers.workflow.express.title' | translate }}</h2>
    <p class="customer-workflow-step__hint">{{ 'customers.workflow.express.hint' | translate }}</p>
  </header>

  <form [formGroup]="form" class="customer-workflow-step__form">
    <app-input
      [label]="'customers.workflow.identity.nameLabel' | translate"
      formControlName="name"
      [required]="true"
      [maxlength]="200"
      data-testid="customer-express-name" />
    <app-input
      [label]="'customers.workflow.identity.companyNameLabel' | translate"
      formControlName="companyName"
      [maxlength]="200"
      data-testid="customer-express-company-name" />
    <app-input
      [label]="'customers.workflow.identity.emailLabel' | translate"
      type="email"
      formControlName="email"
      [maxlength]="256"
      data-testid="customer-express-email" />
    <app-input
      [label]="'customers.workflow.identity.phoneLabel' | translate"
      formControlName="phone"
      mask="phone"
      data-testid="customer-express-phone" />
    <app-currency-input
      [label]="'customers.workflow.creditAndTax.creditLimitLabel' | translate"
      formControlName="creditLimit"
      data-testid="customer-express-credit-limit" />
    <app-select
      [label]="'customers.workflow.creditAndTax.defaultCurrencyLabel' | translate"
      formControlName="defaultCurrency"
      [options]="currencyOptions"
      data-testid="customer-express-default-currency" />
    <app-toggle
      [label]="'customers.workflow.creditAndTax.isTaxExemptLabel' | translate"
      formControlName="isTaxExempt"
      data-testid="customer-express-is-tax-exempt" />
    @if (form.controls.isTaxExempt.value) {
      <app-input
        [label]="'customers.workflow.creditAndTax.taxExemptionIdLabel' | translate"
        formControlName="taxExemptionId"
        [required]="true"
        [maxlength]="100"
        data-testid="customer-express-tax-exemption-id" />
    }
  </form>
</section>
