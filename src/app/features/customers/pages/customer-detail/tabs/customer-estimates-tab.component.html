<div class="tab-toolbar">
  <span class="tab-toolbar__spacer"></span>
  <button class="action-btn action-btn--create" (click)="openCreate()"
          [attr.aria-label]="'customers.estimates.newEstimateAriaLabel' | translate">
    <span class="material-icons-outlined">add</span>
    {{ 'customers.estimates.newEstimate' | translate }}
  </button>
</div>

<div class="tab-content tab-content--table">
  <app-data-table
    tableId="customer-estimates"
    [columns]="columns"
    [data]="estimates()"
    [loading]="loading()"
    emptyIcon="request_quote"
    [emptyMessage]="'customers.tabs.noEstimatesYet' | translate"
    [clickableRows]="true"
    (rowClick)="openEdit($any($event))">

    <ng-template appColumnCell="estimatedAmount" let-row>
      <app-currency-display [value]="$any(row).estimatedAmount" [currency]="null" />
    </ng-template>

    <ng-template appColumnCell="status" let-row>
      <span class="chip" [class]="getStatusClass($any(row).status)">{{ $any(row).status }}</span>
    </ng-template>

    <ng-template appColumnCell="validUntil" let-row>
      {{ $any(row).validUntil | date:'MM/dd/yyyy' }}
    </ng-template>

    <ng-template appColumnCell="createdAt" let-row>
      {{ $any(row).createdAt | date:'MM/dd/yyyy' }}
    </ng-template>

    <ng-template appColumnCell="actions" let-row>
      <div class="row-actions">
        @if (!$any(row).generatedQuoteId) {
          <button class="icon-btn" (click)="$event.stopPropagation(); convertToQuote($any(row))"
                  [attr.aria-label]="'customers.estimates.convertToQuoteAriaLabel' | translate"
                  [title]="'customers.estimates.convertToQuote' | translate">
            <span class="material-icons-outlined">forward</span>
          </button>
        }
        <button class="icon-btn icon-btn--danger" (click)="$event.stopPropagation(); deleteEstimate($any(row))"
                [attr.aria-label]="'customers.estimates.deleteEstimateAriaLabel' | translate">
          <span class="material-icons-outlined">delete</span>
        </button>
      </div>
    </ng-template>
  </app-data-table>
</div>

@if (showDialog()) {
  <app-dialog [title]="dialogTitle()" width="520px" (closed)="closeDialog()">
    <div [formGroup]="estimateForm">
      <app-input [label]="'customers.estimates.title' | translate" formControlName="title" [required]="true" />
      <app-textarea [label]="'customers.estimates.description' | translate" formControlName="description" [rows]="2" />
      <div class="dialog-row">
        <app-currency-input [label]="'customers.estimates.estimatedAmount' | translate" formControlName="estimatedAmount" [required]="true" />
        <app-datepicker [label]="'customers.estimates.validUntil' | translate" formControlName="validUntil" />
      </div>
      @if (isEditing()) {
        <app-select [label]="'common.status' | translate" formControlName="status" [options]="statusOptions" />
      }
      <app-textarea [label]="'customers.estimates.notes' | translate" formControlName="notes" [rows]="2" />
    </div>
    <div dialog-footer>
      <button class="action-btn" (click)="closeDialog()">{{ 'common.cancel' | translate }}</button>
      <app-validation-button [violations]="violations()" [loading]="saving()">
      <button class="action-btn action-btn--primary"
        [disabled]="estimateForm.invalid || saving()"
        (click)="saveEstimate()">{{ 'common.save' | translate }}</button>
      </app-validation-button>
    </div>
  </app-dialog>
}
