<div class="cd-pricing-tab">
  <header class="cd-pricing-tab__header">
    <h3 class="cd-pricing-tab__title">{{ 'customers.pricing.lists' | translate }}</h3>

    @if (priceLists().length > 1) {
      <app-select
        data-testid="price-list-selector"
        [label]="'customers.pricing.lists' | translate"
        [formControl]="selectedListControl"
        [options]="listOptions()" />
    }

    <button class="action-btn action-btn--sm action-btn--create"
      data-testid="price-list-new-btn"
      (click)="createNewList()"
      [attr.aria-label]="'customers.pricing.newList' | translate">
      <span class="material-icons-outlined">add</span>
      {{ 'customers.pricing.newList' | translate }}
    </button>
  </header>

  @if (selectedList(); as list) {
    <section class="cd-pricing-tab__entries" data-testid="price-list-entries-section">
      <div class="cd-pricing-tab__entries-header">
        <h4 class="cd-pricing-tab__list-name" data-testid="price-list-header-name">{{ list.name }}</h4>
        <span class="cd-pricing-tab__effective text-muted">
          {{ 'customers.pricing.effective' | translate }}: {{ formatRange(list) }}
        </span>
        <button class="action-btn action-btn--sm"
          data-testid="price-list-bulk-import-btn"
          (click)="openBulkImport()"
          [matTooltip]="'priceListEntry.bulkImport.label' | translate"
          [attr.aria-label]="'priceListEntry.bulkImport.label' | translate">
          <span class="material-icons-outlined">upload_file</span>
          {{ 'priceListEntry.bulkImport.label' | translate }}
        </button>
        <button class="icon-btn"
          data-testid="price-list-edit-btn"
          (click)="editList(list)"
          [matTooltip]="'priceList.editList' | translate"
          [attr.aria-label]="'priceList.editList' | translate">
          <span class="material-icons-outlined">edit</span>
        </button>
        <button class="icon-btn icon-btn--danger"
          data-testid="price-list-delete-btn"
          (click)="deleteList(list)"
          [matTooltip]="'priceList.deleteList' | translate"
          [attr.aria-label]="'priceList.deleteList' | translate">
          <span class="material-icons-outlined">delete</span>
        </button>
      </div>
      <app-price-list-entries-table
        [priceListId]="list.id"
        [entries]="entries()"
        [loading]="entriesLoading()"
        (add)="onAdd()"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        (cellSaved)="onCellSaved($event)" />
    </section>
  } @else if (!listsLoading()) {
    <app-empty-state
      icon="sell"
      [message]="'customers.pricing.noLists' | translate"
      [actionLabel]="'customers.pricing.createFirstList' | translate"
      (action)="createNewList()" />
  }
</div>
