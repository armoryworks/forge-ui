<app-page-header [title]="'customers.title' | translate" [subtitle]="'customers.subtitle' | translate">
  <button class="action-btn action-btn--create" data-testid="new-customer-btn" (click)="openCreateCustomer()">
    <span class="material-icons-outlined">add</span>
    {{ 'customers.createCustomer' | translate }}
  </button>
</app-page-header>

<div class="customers-layout">
  <div class="filters-bar">
    <app-input [label]="'common.search' | translate" [formControl]="searchControl"
      [placeholder]="'customers.searchPlaceholder' | translate"
      (keyup.enter)="applyFilters()" />
    <app-select [label]="'common.status' | translate" [formControl]="activeFilterControl" [options]="activeOptions" />
  </div>

  <div [appLoadingBlock]="loading()" class="customers-list-content">
    <app-data-table
      tableId="customers"
      [columns]="customerColumns"
      [data]="customers()"
      emptyIcon="people"
      [emptyMessage]="'customers.noCustomersFound' | translate"
      [clickableRows]="true"
      (rowClick)="selectCustomer($any($event))">

      <ng-template appColumnCell="name" let-row>
        <span class="customer-name">{{ row.name }}</span>
        <app-entity-completeness-badge entityType="Customer" [entityId]="row.id" />
      </ng-template>
      <ng-template appColumnCell="companyName" let-row>
        <span class="text-muted">{{ row.companyName ?? '—' }}</span>
      </ng-template>
      <ng-template appColumnCell="email" let-row>
        <span class="text-muted">{{ row.email ?? '—' }}</span>
      </ng-template>
      <ng-template appColumnCell="phone" let-row>
        <span class="text-muted">{{ row.phone ?? '—' }}</span>
      </ng-template>
      <ng-template appColumnCell="isActive" let-row>
        <span [class]="row.isActive ? 'chip chip--success' : 'chip chip--muted'">
          {{ row.isActive ? ('common.active' | translate) : ('common.inactive' | translate) }}
        </span>
      </ng-template>
      <ng-template appColumnCell="createdAt" let-row>
        <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
      </ng-template>
      <ng-template appColumnCell="completeness" let-row>
        <app-entity-completeness-chip entityType="Customer" [entityId]="row.id" />
      </ng-template>
    </app-data-table>
  </div>
</div>

<!-- Create Customer Dialog -->
@if (showDialog()) {
  <app-dialog [title]="'customers.createCustomer' | translate" [dirty]="customerForm.dirty" (closed)="closeDialog()">
    <div [formGroup]="customerForm">
      <app-input [label]="'common.name' | translate" formControlName="name" [required]="true" data-testid="customer-name" />
      <app-input [label]="'customers.companyName' | translate" formControlName="companyName" data-testid="customer-company" />
      <div class="dialog-row">
        <app-input [label]="'common.email' | translate" type="email" formControlName="email" data-testid="customer-email" />
        <app-input [label]="'common.phone' | translate" formControlName="phone" data-testid="customer-phone" />
      </div>

      <!-- F17 — Quick add is intentionally just the essentials (name + a
           couple of contact bits). Credit limit, tax/currency, and billing/
           shipping addresses live on the Guided path and the customer detail
           page; surfacing them here contradicted the "quick" promise. The
           form still carries those controls (defaulted/empty) so the create
           payload shape is unchanged. -->
      <p class="text-muted">{{ 'customers.quickAddHint' | translate }}</p>
    </div>

    <div dialog-footer>
      <button class="action-btn" (click)="closeDialog()">{{ 'common.cancel' | translate }}</button>
      <app-validation-button [violations]="customerViolations" [loading]="saving()">
      <button class="action-btn action-btn--primary"
        data-testid="customer-save-btn"
        [disabled]="customerForm.invalid || saving()"
        (click)="saveCustomer()">
        <span class="material-icons-outlined">save</span>
        {{ 'customers.createCustomer' | translate }}
      </button>
      </app-validation-button>
    </div>
  </app-dialog>
}
