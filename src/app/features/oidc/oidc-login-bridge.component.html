<div class="bridge-shell">
  <mat-card class="bridge-card">
    @if (error()) {
      <mat-icon class="bridge-icon bridge-icon--error" aria-hidden="true">error_outline</mat-icon>
      <h2>Sign-in unavailable</h2>
      <p>{{ error() }}</p>
    } @else {
      <mat-icon class="bridge-icon spin" aria-hidden="true">sync</mat-icon>
      <h2>Redirecting&hellip;</h2>
      <p>Preparing your secure handoff to the application.</p>
    }
  </mat-card>
</div>
