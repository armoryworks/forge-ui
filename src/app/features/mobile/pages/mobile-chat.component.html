@if (view() === 'list') {
  <div class="mobile-chat">
    <div class="mobile-chat__header">
      <h2 class="mobile-chat__title">{{ 'chat.title' | translate }}</h2>
    </div>

    <!-- Mobile search bar -->
    <div class="mobile-chat__search">
      <span class="material-icons-outlined">search</span>
      <input
        class="mobile-chat__search-input"
        type="text"
        [placeholder]="'chat.searchConversations' | translate"
        [formControl]="searchControl"
        aria-label="Search conversations" />
    </div>

    <div class="mobile-chat__channel-list-wrapper">
      <app-chat-channel-list
        [conversations]="filteredConversations()"
        [channels]="filteredChannels()"
        [selectedChannelId]="selectedChannelId()"
        [selectedUserId]="selectedUserId()"
        (channelSelected)="onChannelSelected($event)"
        (newGroup)="openCreateChannel()"
        (browseChannels)="openBrowseChannels()"
        (muteToggled)="onMuteToggled($event)" />
    </div>
  </div>
} @else {
  <!-- DM or Channel message view -->
  <div class="mobile-chat mobile-chat--conversation">
    <app-chat-channel-header
      [conversation]="selectedConversation()"
      [channel]="selectedChannel()"
      [showBack]="true"
      [showPopout]="false"
      [showClose]="false"
      (backClicked)="backToList()"
      (settingsClicked)="openChannelSettings()"
      (muteToggled)="onHeaderMuteToggled($event)" />

    <app-chat-message-area
      #messageArea
      [messages]="messages()"
      [currentUserId]="currentUserId()"
      [isChannel]="isChannel()"
      [isReadOnly]="isReadOnly()"
      [showFileAttach]="true"
      [pendingFile]="pendingFile()"
      [pendingFileAttachmentId]="pendingFileAttachmentId()"
      [isUploading]="isUploading()"
      (messageSent)="onMessageSent($event)"
      (threadOpened)="onThreadOpened($event)"
      (fileSelected)="onFileSelected($event)"
      (fileCancelled)="onFileCancelled()" />
  </div>

  <!-- Mobile Thread View (full-screen slide-over) -->
  @if (threadParentMessage(); as parent) {
    <div class="mobile-thread-overlay" role="dialog" aria-label="Thread">
      <div class="mobile-thread-overlay__content">
        <app-chat-thread-panel
          [parentMessage]="parent"
          [replies]="threadReplies()"
          (replySent)="onThreadReplySent($event)"
          (closed)="closeThread()" />
      </div>
    </div>
  }
}
