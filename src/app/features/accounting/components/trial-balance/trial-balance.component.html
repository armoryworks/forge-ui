<app-page-header title="Trial Balance" subtitle="Debits and credits by account">
  @if (report(); as r) {
    <span class="chip" [class.chip--success]="r.isBalanced" [class.chip--error]="!r.isBalanced">
      {{ r.isBalanced ? 'Balanced' : 'Out of balance' }}
    </span>
  }
  <button type="button" class="action-btn" (click)="load()" [disabled]="loading()">
    <span class="material-icons-outlined acct-refresh-icon" aria-hidden="true">refresh</span>
    Refresh
  </button>
</app-page-header>

<div class="page-content page-content--table">
  @if (error()) {
    <p class="acct-error" role="alert">{{ error() }}</p>
  }

  <app-data-table
    tableId="acct-trial-balance"
    [columns]="columns"
    [data]="report()?.rows ?? []"
    [loading]="loading()"
    emptyIcon="balance"
    emptyMessage="No ledger activity">
    <ng-template appColumnCell="debitTotal" let-row>
      <app-currency-display [value]="row.debitTotal" />
    </ng-template>
    <ng-template appColumnCell="creditTotal" let-row>
      <app-currency-display [value]="row.creditTotal" />
    </ng-template>
    <ng-template appColumnCell="netBalance" let-row>
      <app-currency-display [value]="row.netBalance" />
    </ng-template>
  </app-data-table>

  @if (report(); as r) {
    <div class="totals-strip">
      <span class="totals-strip__label">Total</span>
      <span class="totals-strip__metric">Debit <app-currency-display [value]="r.totalDebit" /></span>
      <span class="totals-strip__metric">Credit <app-currency-display [value]="r.totalCredit" /></span>
    </div>
  }
</div>
