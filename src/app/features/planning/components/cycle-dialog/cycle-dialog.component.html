<app-dialog [title]="dialogTitle()" width="520px" [draftConfig]="draftConfig()" [draftFormGroup]="formGroup" (closed)="close()">

  <div [formGroup]="formGroup">
    <app-input [label]="'planning.cycleName' | translate" formControlName="name" data-testid="cycle-name" [placeholder]="'planning.cycleNamePlaceholder' | translate" />

    <div class="dialog-row">
      <app-datepicker [label]="'common.startDate' | translate" formControlName="startDate" data-testid="cycle-start-date" />
      <app-datepicker [label]="'common.endDate' | translate" formControlName="endDate" data-testid="cycle-end-date" />
    </div>

    <app-textarea [label]="'planning.goals' | translate" formControlName="goals" data-testid="cycle-goals" [rows]="3" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <app-validation-button [violations]="violations" [loading]="saving()">
    <button class="action-btn action-btn--primary"
      [disabled]="formGroup.invalid || saving()"
      data-testid="cycle-save-btn" (click)="save()">
      @if (saving()) {
        <span class="material-icons-outlined spin">sync</span>
      } @else {
        <span class="material-icons-outlined">save</span>
      }
      {{ isEditMode() ? ('planning.update' | translate) : ('common.create' | translate) }}
    </button>
    </app-validation-button>
  </div>
</app-dialog>
