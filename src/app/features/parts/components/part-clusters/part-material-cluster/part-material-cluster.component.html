<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.material.title' | translate }}</h3>

  <div class="cluster__form-row">
    <app-select data-testid="part-material-spec"
      [label]="'parts.detail.material.spec' | translate"
      formControlName="materialSpecId"
      [options]="materialSpecOptions()"
      [isReadonly]="!editing()" />
  </div>

  <div class="cluster__form-row">
    <app-input data-testid="part-material-weight"
      [label]="'parts.detail.material.weight' | translate"
      type="number"
      formControlName="weight"
      [isReadonly]="!editing()" />
    <app-select data-testid="part-material-weight-unit"
      label="Unit"
      formControlName="weightDisplayUnit"
      [options]="weightUnitOptions"
      [isReadonly]="!editing()" />
  </div>

  <div class="cluster__form-row">
    <app-input label="Length" type="number" formControlName="length" [isReadonly]="!editing()" />
    <app-input label="Width" type="number" formControlName="width" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-input label="Height" type="number" formControlName="height" [isReadonly]="!editing()" />
    <app-select data-testid="part-material-dim-unit"
      label="Unit"
      formControlName="dimensionDisplayUnit"
      [options]="dimensionUnitOptions"
      [isReadonly]="!editing()" />
  </div>

  <div class="cluster__form-row">
    <app-input data-testid="part-material-volume"
      [label]="'parts.detail.material.volume' | translate"
      type="number"
      formControlName="volume"
      [isReadonly]="!editing()" />
    <app-select data-testid="part-material-volume-unit"
      label="Unit"
      formControlName="volumeDisplayUnit"
      [options]="volumeUnitOptions"
      [isReadonly]="!editing()" />
  </div>

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">Cancel</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          data-testid="part-material-save"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          Save
        </button>
      </app-validation-button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--secondary" type="button"
          data-testid="part-material-save-close"
          [disabled]="form.invalid || saving()"
          (click)="onSave(true)">
          {{ 'common.saveAndClose' | translate }}
        </button>
      </app-validation-button>
    </div>
  }
</div>
