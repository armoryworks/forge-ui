<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.uom.title' | translate }}</h3>
  @if (editing()) {
    <p class="cluster__value cluster__value--muted">{{ 'parts.detail.uom.helper' | translate }}</p>
  }

  <div class="cluster__form-row">
    <app-select data-testid="part-uom-stock"
      [label]="'parts.detail.uom.stock' | translate"
      formControlName="stockUomId"
      [options]="uomOptions()"
      [isReadonly]="!editing()" />
    <app-select data-testid="part-uom-purchase"
      [label]="'parts.detail.uom.purchase' | translate"
      formControlName="purchaseUomId"
      [options]="uomOptions()"
      [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-select data-testid="part-uom-sales"
      [label]="'parts.detail.uom.sales' | translate"
      formControlName="salesUomId"
      [options]="uomOptions()"
      [isReadonly]="!editing()" />
  </div>

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">Cancel</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          data-testid="part-uom-save"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          Save
        </button>
      </app-validation-button>
    </div>
  }
</div>
