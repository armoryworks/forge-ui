<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.tabs.inventory' | translate }}</h3>

  <div class="cluster__form-row">
    <app-input label="Min Stock" type="number" formControlName="minStockThreshold" [isReadonly]="!editing()" />
    <app-input label="Reorder Point" type="number" formControlName="reorderPoint" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-input label="Reorder Quantity" type="number" formControlName="reorderQuantity" [isReadonly]="!editing()" />
    <app-input label="Safety Stock (days)" type="number" formControlName="safetyStockDays" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-select label="Traceability" formControlName="traceabilityType" [options]="traceabilityOptions" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-select label="ABC Class" formControlName="abcClass" [options]="abcOptions" [isReadonly]="!editing()" />
  </div>

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">Cancel</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          Save
        </button>
      </app-validation-button>
    </div>
  }
</div>
