<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.tabs.inventory' | translate }}</h3>

  <div class="cluster__form-row">
    <app-input [label]="'parts.detail.clusters.inventory.minStock' | translate" type="number" formControlName="minStockThreshold" [isReadonly]="!editing()" />
    <app-input [label]="'parts.detail.clusters.inventory.reorderPoint' | translate" type="number" formControlName="reorderPoint" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-input [label]="'parts.detail.clusters.inventory.reorderQuantity' | translate" type="number" formControlName="reorderQuantity" [isReadonly]="!editing()" />
    <app-input [label]="'parts.detail.clusters.inventory.safetyStockDays' | translate" type="number" formControlName="safetyStockDays" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-select [label]="'parts.detail.clusters.inventory.traceability' | translate" formControlName="traceabilityType" [options]="traceabilityOptions" [isReadonly]="!editing()" />
  </div>
  <div class="cluster__form-row">
    <app-select [label]="'parts.detail.clusters.inventory.abcClass' | translate" formControlName="abcClass" [options]="abcOptions" [isReadonly]="!editing()" />
  </div>

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">{{ 'common.cancel' | translate }}</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          {{ 'common.save' | translate }}
        </button>
      </app-validation-button>
    </div>
  }
</div>
