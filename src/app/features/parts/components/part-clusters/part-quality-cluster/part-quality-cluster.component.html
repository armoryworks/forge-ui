<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.quality.title' | translate }}</h3>

  <app-toggle data-testid="part-quality-requires-inspection"
    [label]="'parts.detail.quality.requiresInspection' | translate"
    formControlName="requiresReceivingInspection"
    [isReadonly]="!editing()" />

  <div class="cluster__form-row">
    <app-select data-testid="part-quality-frequency"
      [label]="'parts.detail.quality.inspectionFrequency' | translate"
      formControlName="inspectionFrequency"
      [options]="inspectionFrequencyOptions"
      [isReadonly]="!editing()" />
    <app-input data-testid="part-quality-skip-after"
      [label]="'parts.detail.quality.inspectionSkipAfter' | translate"
      type="number"
      formControlName="inspectionSkipAfterN"
      [isReadonly]="!editing()" />
  </div>

  <div *appCap="'CAP-MD-PART-COMPLIANCE'" class="cluster__form-row">
    <app-entity-picker
      [label]="'parts.detail.quality.inspectionTemplate' | translate"
      entityType="receiving-inspection-templates"
      displayField="name"
      formControlName="receivingInspectionTemplateId"
      [isReadonly]="!editing()" />
  </div>

  @if (showCompliance()) {
    <div class="cluster__form-row">
      <app-input data-testid="part-quality-hazmat"
        [label]="'parts.detail.quality.hazmatClass' | translate"
        formControlName="hazmatClass"
        [isReadonly]="!editing()" />
      <app-input data-testid="part-quality-shelf-life"
        [label]="'parts.detail.quality.shelfLifeDays' | translate"
        type="number"
        formControlName="shelfLifeDays"
        [isReadonly]="!editing()" />
    </div>

    <div class="cluster__form-row">
      <app-select data-testid="part-quality-backflush"
        [label]="'parts.detail.quality.backflushPolicy' | translate"
        formControlName="backflushPolicy"
        [options]="backflushOptions"
        [isReadonly]="!editing()" />
    </div>
  }

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">Cancel</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          data-testid="part-quality-save"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          Save
        </button>
      </app-validation-button>
    </div>
  }
</div>
