<div class="cluster" [formGroup]="form">
  <h3 class="cluster__title">{{ 'parts.detail.mrp.title' | translate }}</h3>

  <app-toggle data-testid="part-mrp-isplanned"
    [label]="'parts.detail.mrp.isMrpPlanned' | translate"
    formControlName="isMrpPlanned"
    [isReadonly]="!editing()" />

  <div class="cluster__form-row">
    <app-select data-testid="part-mrp-lotrule"
      [label]="'parts.detail.mrp.lotSizingRule' | translate"
      formControlName="lotSizingRule"
      [options]="lotSizingOptions"
      [isReadonly]="!editing()" />
    @if (showFixedQty()) {
      <app-input data-testid="part-mrp-fixedqty"
        [label]="'parts.detail.mrp.fixedOrderQty' | translate"
        type="number"
        formControlName="fixedOrderQuantity"
        [isReadonly]="!editing()" />
    }
  </div>

  <div class="cluster__form-row">
    <app-input data-testid="part-mrp-minqty"
      [label]="'parts.detail.mrp.minOrderQty' | translate"
      type="number"
      formControlName="minimumOrderQuantity"
      [isReadonly]="!editing()" />
    @if (showOrderMultiple()) {
      <app-input data-testid="part-mrp-multiple"
        [label]="'parts.detail.mrp.orderMultiple' | translate"
        type="number"
        formControlName="orderMultiple"
        [isReadonly]="!editing()" />
    }
  </div>

  <div class="cluster__form-row">
    <app-input data-testid="part-mrp-planning-fence"
      [label]="'parts.detail.mrp.planningFence' | translate"
      type="number"
      formControlName="planningFenceDays"
      [isReadonly]="!editing()" />
    <app-input data-testid="part-mrp-demand-fence"
      [label]="'parts.detail.mrp.demandFence' | translate"
      type="number"
      formControlName="demandFenceDays"
      [isReadonly]="!editing()" />
  </div>

  <p class="cluster__value cluster__value--muted">{{ 'parts.detail.mrp.leadTimeNote' | translate }}</p>

  @if (editing()) {
    <div class="cluster__actions">
      <button class="action-btn" type="button" (click)="onCancel()">Cancel</button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--primary" type="button"
          data-testid="part-mrp-save"
          [disabled]="form.invalid || saving()"
          (click)="onSave()">
          <span class="material-icons-outlined">save</span>
          Save
        </button>
      </app-validation-button>
      <app-validation-button [violations]="violations" [loading]="saving()">
        <button class="action-btn action-btn--secondary" type="button"
          data-testid="part-mrp-save-close"
          [disabled]="form.invalid || saving()"
          (click)="onSave(true)">
          {{ 'common.saveAndClose' | translate }}
        </button>
      </app-validation-button>
    </div>
  }
</div>
