<section class="part-sales-hooks-step" [appLoadingBlock]="saving()" data-testid="part-sales-hooks-step">
  <header class="part-sales-hooks-step__header">
    <h2 class="part-sales-hooks-step__title">{{ 'parts.workflow.salesHooks.title' | translate }}</h2>
    <p class="part-sales-hooks-step__hint">{{ 'parts.workflow.salesHooks.hint' | translate }}</p>
  </header>

  <form [formGroup]="form" class="part-sales-hooks-step__form">
    <app-select
      [label]="'parts.workflow.salesHooks.salesUomLabel' | translate"
      formControlName="salesUomCode"
      [options]="salesUomOptions"
      data-testid="sales-hooks-sales-uom" />

    <div class="part-sales-hooks-step__inferred-price" data-testid="sales-hooks-inferred-price">
      <span class="part-sales-hooks-step__inferred-price-label">
        {{ 'parts.workflow.salesHooks.inferredPriceLabel' | translate }}
      </span>
      <span class="part-sales-hooks-step__inferred-price-value">
        ${{ effectivePrice() }}
      </span>
      <span class="part-sales-hooks-step__inferred-price-source">
        {{ effectivePriceSourceLabelKey() | translate }}
      </span>
    </div>
  </form>
</section>
