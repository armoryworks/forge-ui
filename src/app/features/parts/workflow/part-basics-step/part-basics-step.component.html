<section class="part-basics-step" [appLoadingBlock]="saving()" data-testid="part-basics-step">
  <header class="part-basics-step__header">
    <h2 class="part-basics-step__title">{{ 'parts.workflow.basics.title' | translate }}</h2>
    <p class="part-basics-step__hint">{{ 'parts.workflow.basics.hint' | translate }}</p>
  </header>

  <form [formGroup]="form" class="part-basics-step__form">
    <app-input
      [label]="'parts.workflow.basics.nameLabel' | translate"
      formControlName="name"
      [required]="true"
      [maxlength]="256"
      data-testid="basics-name" />

    <div class="part-basics-step__field">
      <app-textarea
        [label]="'parts.workflow.basics.descriptionLabel' | translate"
        formControlName="description"
        [rows]="3"
        [maxlength]="2000"
        data-testid="basics-description" />
      <p class="part-basics-step__hint part-basics-step__hint--field">
        {{ 'parts.workflow.basics.descriptionHelper' | translate }}
      </p>
    </div>

    <app-input
      [label]="'parts.workflow.basics.manufacturerNameLabel' | translate"
      formControlName="manufacturerName"
      data-testid="basics-manufacturer-name" />

    <app-input
      [label]="'parts.workflow.basics.manufacturerPartNumberLabel' | translate"
      formControlName="manufacturerPartNumber"
      data-testid="basics-manufacturer-pn" />

    <app-input
      [label]="'parts.workflow.basics.externalPartNumberLabel' | translate"
      formControlName="externalPartNumber"
      [placeholder]="'parts.workflow.basics.externalPartNumberPlaceholder' | translate"
      data-testid="basics-external-number" />
  </form>
</section>
