<section class="part-sourcing-step" [appLoadingBlock]="saving()" data-testid="part-sourcing-step">
  <header class="part-sourcing-step__header">
    <h2 class="part-sourcing-step__title">{{ 'parts.workflow.sourcing.title' | translate }}</h2>
    <p class="part-sourcing-step__hint">{{ 'parts.workflow.sourcing.hint' | translate }}</p>
  </header>

  <form [formGroup]="form" class="part-sourcing-step__form">
    <app-entity-picker
      [label]="'parts.workflow.sourcing.preferredVendorLabel' | translate"
      entityType="vendors"
      formControlName="preferredVendorId"
      data-testid="sourcing-preferred-vendor" />

    <div class="part-sourcing-step__field">
      <app-input
        [label]="'parts.workflow.sourcing.leadTimeDaysLabel' | translate"
        type="number"
        formControlName="leadTimeDays"
        data-testid="sourcing-lead-time" />
      <p class="part-sourcing-step__hint part-sourcing-step__hint--field">
        {{ 'parts.workflow.sourcing.leadTimeDaysHelper' | translate }}
      </p>
    </div>

    <app-input
      [label]="'parts.workflow.sourcing.minOrderQtyLabel' | translate"
      type="number"
      formControlName="minOrderQty"
      data-testid="sourcing-moq" />

    <app-input
      [label]="'parts.workflow.sourcing.packSizeLabel' | translate"
      type="number"
      formControlName="packSize"
      data-testid="sourcing-pack-size" />

    <app-input
      [label]="'parts.workflow.sourcing.externalPartNumberLabel' | translate"
      formControlName="externalPartNumber"
      [maxlength]="100"
      data-testid="sourcing-external-part-number" />
  </form>
</section>
