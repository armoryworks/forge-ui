<section class="part-sourcing-step" [appLoadingBlock]="saving()" data-testid="part-sourcing-step">
  <header class="part-sourcing-step__header">
    <h2 class="part-sourcing-step__title">{{ 'parts.workflow.sourcing.title' | translate }}</h2>
    <p class="part-sourcing-step__hint">{{ 'parts.workflow.sourcing.hint' | translate }}</p>
  </header>


  <form [formGroup]="form" class="part-sourcing-step__form">
    <app-entity-picker
      [label]="'parts.workflow.sourcing.preferredVendorLabel' | translate"
      entityType="vendors"
      displayField="companyName"
      secondaryDisplayField="contactName"
      [createNewLabel]="('vendors.vendor' | translate).toLowerCase()"
      [placeholder]="'vendors.searchByCompanyName' | translate"
      (createNew)="onCreateNewVendor($event)"
      formControlName="preferredVendorId"
      data-testid="sourcing-preferred-vendor" />
  </form>
</section>
