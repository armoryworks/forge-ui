<section class="part-express-form" [appLoadingBlock]="saving()" data-testid="part-express-form">
  <header class="part-express-form__header">
    <h2 class="part-express-form__title">{{ 'parts.workflow.express.title' | translate }}</h2>
    @if (axisLabel()) {
      <span class="part-express-form__type-chip chip" data-testid="express-axis-locked">
        {{ axisLabel() }}
      </span>
      <p class="part-express-form__hint">{{ 'parts.workflow.express.typeLockedHint' | translate }}</p>
    } @else {
      <p class="part-express-form__hint">{{ 'parts.workflow.express.hint' | translate }}</p>
    }
  </header>

  <form [formGroup]="form" class="part-express-form__form">
    <app-input
      [label]="'parts.workflow.basics.nameLabel' | translate"
      formControlName="name"
      [required]="true"
      [maxlength]="256"
      data-testid="express-name" />

    <div class="part-express-form__field">
      <app-textarea
        [label]="'parts.workflow.basics.descriptionLabel' | translate"
        formControlName="description"
        [rows]="3"
        [maxlength]="2000"
        data-testid="express-description" />
      <p class="part-express-form__hint part-express-form__hint--field">
        {{ 'parts.workflow.basics.descriptionHelper' | translate }}
      </p>
    </div>

    <app-select
      [label]="'parts.workflow.quality.traceabilityLabel' | translate"
      formControlName="traceabilityType"
      [options]="traceabilityOptions"
      [required]="true"
      data-testid="express-traceability" />

    <app-select
      [label]="'parts.workflow.quality.abcClassLabel' | translate"
      formControlName="abcClass"
      [options]="abcClassOptions"
      data-testid="express-abc-class" />

    <app-currency-input
      [label]="'parts.workflow.costing.manualOverrideLabel' | translate"
      formControlName="manualCostOverride"
      [placeholder]="'parts.workflow.costing.manualOverridePlaceholder' | translate"
      data-testid="express-manual-override" />
  </form>

  <div class="part-express-form__actions">
    <app-validation-button class="validation-button--inline" [violations]="violations" [loading]="saving()">
      <button
        class="action-btn action-btn--primary"
        type="button"
        data-testid="express-save-btn"
        [disabled]="form.invalid || saving()"
        (click)="save()">
        <span class="material-icons-outlined">save</span>
        {{ 'parts.workflow.express.save' | translate }}
      </button>
    </app-validation-button>
  </div>
</section>
