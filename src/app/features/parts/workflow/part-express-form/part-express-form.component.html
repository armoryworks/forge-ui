<section class="part-express-form" [appLoadingBlock]="saving()" data-testid="part-express-form">
  <header class="part-express-form__header">
    <h2 class="part-express-form__title">{{ 'parts.workflow.express.title' | translate }}</h2>
    <p class="part-express-form__hint">{{ 'parts.workflow.express.hint' | translate }}</p>
  </header>

  <form [formGroup]="form" class="part-express-form__form">
    <app-select
      [label]="'parts.workflow.basics.partTypeLabel' | translate"
      formControlName="partType"
      [options]="partTypeOptions"
      [required]="true"
      data-testid="express-part-type" />

    <app-input
      [label]="'parts.workflow.basics.descriptionLabel' | translate"
      formControlName="description"
      [required]="true"
      data-testid="express-description" />

    <app-input
      [label]="'parts.workflow.basics.materialLabel' | translate"
      formControlName="material"
      [required]="true"
      data-testid="express-material" />

    <app-input
      [label]="'parts.workflow.basics.externalPartNumberLabel' | translate"
      formControlName="externalPartNumber"
      [placeholder]="'parts.workflow.basics.externalPartNumberPlaceholder' | translate"
      data-testid="express-external-number" />

    <app-input
      [label]="'parts.workflow.costing.manualOverrideLabel' | translate"
      formControlName="manualCostOverride"
      type="number"
      [placeholder]="'parts.workflow.costing.manualOverridePlaceholder' | translate"
      prefix="$"
      data-testid="express-manual-override" />
  </form>
</section>
