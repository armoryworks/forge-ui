<div class="auth-page">
  <mat-card appearance="outlined" class="auth-card">
    <div class="auth-card__header">
      <img class="auth-card__lockup" [src]="branding.marqueeUrl()" alt="Forge — Manufacturing Operations Platform" />
    </div>

    @if (error(); as err) {
      <div class="setup-error">
        <span class="material-icons-outlined">error_outline</span>
        <p>{{ err }}</p>
      </div>
    } @else {
      <p class="auth-card__status">
        @if (tokenInfo()) {
          {{ 'auth.welcomeName' | translate:{ name: welcomeName() } }}
        } @else {
          {{ 'auth.createAccount' | translate }}
        }
      </p>

      <form class="setup-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <app-input [label]="'auth.password' | translate" type="password" formControlName="password" autocomplete="new-password" data-testid="setup-password" />
        <p class="setup-password-hint">{{ 'auth.passwordRequirements' | translate }}</p>
        <app-input [label]="'auth.confirmPassword' | translate" type="password" formControlName="confirmPassword" autocomplete="new-password" data-testid="setup-confirm-password" />

        <app-validation-button [violations]="violations" [loading]="loading()">
          <button class="action-btn action-btn--primary" type="submit"
            [disabled]="form.invalid || loading()"
            data-testid="setup-submit-btn">
            {{ 'auth.completeSetup' | translate }}
          </button>
        </app-validation-button>
      </form>
    }
  </mat-card>
</div>
