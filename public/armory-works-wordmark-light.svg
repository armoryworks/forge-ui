<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img" aria-label="Armory Works Technology, LLC">
  <!--
    Light-background variant of the nav nameplate, scaled up so the
    wordmark stack matches the shield's height. Wordmark is navy and
    the sub-line is a darker amber so both pass contrast on white.
    Each visible element carries its own soft drop shadow.
  -->
  <defs>
    <!-- Very generous percentage filter region so thin shapes (the amber
         rule) still have room to cast a shadow below them. -->
    <filter id="aw-shadow" x="-20%" y="-300%" width="140%" height="700%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>

    <path id="aw-shield" d="M 200,25 C 257,50.1 323.2,58.1 390,60 C 374.5,107.7 382.1,162.4 374.9,212.6 C 361.1,309.5 325.5,336.5 251.7,388.6 L 200,425 L 148.3,388.6 C 74.5,336.5 38.9,309.5 25.1,212.6 C 17.9,162.4 25.5,107.7 10,60 C 76.8,58.1 143,50.1 200,25 Z"/>
    <path id="aw-inner"  d="M 200,99 C 235.9,114.8 277.6,119.8 319.7,121 C 309.9,151.1 314.7,185.6 310.2,217.2 C 301.5,278.2 279.1,295.3 232.6,328 L 200,351 L 167.4,328 C 120.9,295.3 98.5,278.2 89.8,217.2 C 85.3,185.6 90.1,151.1 80.3,121 C 122.4,119.8 164.1,114.8 200,99 Z"/>
    <clipPath id="aw-leftHalf"><rect x="0" y="0" width="200" height="470"/></clipPath>
    <clipPath id="aw-rightHalf"><rect x="200" y="0" width="200" height="470"/></clipPath>
    <g id="aw-W" transform="translate(106 300) scale(0.2 -0.2)">
      <path d="M963 599V681H662V599L675 597C721 597 749 583 749 549C749 544 749 539 748 534L651 206L559 537C556 548 555 557 555 564C555 585 567 592 600 596L624 599V681H312V599C348 598 360 587 376 544L409 453L331 213L244 540C241 551 239 561 239 569C239 587 249 597 281 599V681H-20V599C27 597 45 577 64 517L228 0H357L456 311L549 0H680L836 480C867 575 880 588 947 597Z"/>
    </g>

    <mask id="aw-outerRightMask" maskUnits="userSpaceOnUse" x="0" y="0" width="400" height="470">
      <rect x="0" y="0" width="400" height="470" fill="white"/>
      <g clip-path="url(#aw-rightHalf)">
        <use href="#aw-inner" fill="black"/>
        <use href="#aw-W"     fill="white"/>
      </g>
    </mask>

    <mask id="aw-innerLeftMask" maskUnits="userSpaceOnUse" x="0" y="0" width="400" height="470">
      <rect x="0" y="0" width="400" height="470" fill="black"/>
      <g clip-path="url(#aw-leftHalf)">
        <use href="#aw-inner" fill="white"/>
        <use href="#aw-W"     fill="black"/>
      </g>
    </mask>
  </defs>

  <!-- Shield: filter on the outer wrapper, transform + masks on an inner
       group — Chromium otherwise clips when filter + mask are on the same
       element. Source 400×470 scales to 45×53 via 0.1125. -->
  <g filter="url(#aw-shadow)">
    <g transform="translate(2 3) scale(0.1125)">
      <g clip-path="url(#aw-rightHalf)">
        <use href="#aw-shield" fill="#f59e0b" mask="url(#aw-outerRightMask)"/>
      </g>
      <use href="#aw-inner"  fill="#f59e0b" mask="url(#aw-innerLeftMask)"/>
      <use href="#aw-shield" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linejoin="miter" stroke-miterlimit="4"/>
      <use href="#aw-inner"  fill="none" stroke="#f59e0b" stroke-width="4" stroke-linejoin="miter" stroke-miterlimit="4"/>
    </g>
  </g>

