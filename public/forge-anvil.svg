<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 470" width="440" height="470" role="img" aria-label="Forge">
  <!--
    Forge product mark. Stylistic sibling of armory-works-logo.svg
    (same #f59e0b amber + same miter-join stroke treatment).

    Asymmetric anvil silhouette. The HORN is the dominant visual cue
    so it projects substantially right and tapers smoothly. The face
    is wider than the base (top-heavy, anvil-like) and the waist
    sits between with gentle inward taper.
  -->
  <path
    d="M 60,80
       L 290,80
       Q 360,80 410,130
       Q 360,170 290,170
       L 260,200
       L 245,300
       L 295,335
       L 295,420
       L 95,420
       L 95,335
       L 145,300
       L 130,200
       L 60,170
       Z"
    fill="#f59e0b"
    stroke="#f59e0b"
    stroke-width="6"
    stroke-linejoin="miter"
    stroke-miterlimit="4"/>
</svg>
