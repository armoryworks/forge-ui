# Nightly E2E run for qb-engineer-ui.
#
# Playwright is too slow + brittle to gate every PR. Instead it runs:
#   - nightly at 03:00 UTC against the develop branch
#   - on demand via workflow_dispatch
#   - on push to release/* branches
#
# Failures open an issue with the failing test names + screenshots.

name: Nightly E2E

on:
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC daily
  workflow_dispatch:
  push:
    branches: ['release/*']

permissions:
  contents: read
  issues: write              # to file failure issues

env:
  # Force JavaScript-based actions (checkout, etc.) to run on the runner's
  # Node.js 24 binary. Node 20 is deprecated on GitHub-hosted runners
  # (forced default June 2026, removed September 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # The full Docker stack is needed for Playwright to hit a real backend.
      # We pull the latest server image rather than building from scratch.
      - name: Start backing services
        run: |
          docker run -d --name postgres -p 5432:5432 -e POSTGRES_PASSWORD=postgres postgres:17
          # ... etc; mirror docker-compose.yml's minimal subset
        # Implementation TODO: extract the minimal docker-compose subset
        # needed for E2E into qb-engineer-deploy/compose-e2e.yml and
        # `docker compose -f compose-e2e.yml up -d` here.

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            e2e/test-output/
            playwright-report/
          retention-days: 14
