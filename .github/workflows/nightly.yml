# Nightly E2E run for forge-ui.
#
# Playwright is too slow + brittle to gate every PR. Instead it runs:
#   - nightly at 03:00 UTC
#   - on demand via workflow_dispatch
#   - on push to release/* branches
#
# The suite is SHARDED across parallel runners (Playwright --shard). Each shard
# runs ~1/4 of the specs on its own backing stack, so per-runner wall-clock and
# the cumulative memory/disk degradation that builds up over a ~50-min serial
# run (the dominant source of the connection-refused / timeout flakiness on the
# small ubuntu-latest runner) are both cut down. A final job merges the per-shard
# blob reports into one HTML report.
#
# NOTE on sharding + stateful specs: Playwright shards at FILE granularity, so
# describe.serial blocks stay intact on one shard. Each shard gets a FRESH
# seeded stack, so within-file data fixtures are fine. The only hazard is a test
# that depends on data created by a DIFFERENT spec file — those must be
# self-contained (the invariant-probes etc. create their own fixtures).

name: Nightly E2E

on:
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC daily
  workflow_dispatch:
  push:
    branches: ['release/*']

permissions:
  contents: read
  packages: read             # to pull forge-api / forge-ui images from GHCR

env:
  # Force JavaScript-based actions (checkout, etc.) to run on the runner's
  # Node.js 24 binary. Node 20 is deprecated on GitHub-hosted runners
  # (forced default June 2026, removed September 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SHARD_TOTAL: 4

jobs:
  e2e:
    strategy:
      fail-fast: false        # one bad shard must not cancel the others
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    # Each shard runs ~1/4 of the specs (~13-18 min) + ~12 min setup. 60 is
    # ample headroom; playwright.config's globalTimeout is the graceful inner cap.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # The E2E backing stack lives in the sibling forge-deploy repo
      # (compose-e2e.yml). forge-deploy is public, so the default token can
      # clone it; if it is ever made private, supply a read-only PAT via
      #   token: ${{ secrets.FORGE_DEPLOY_RO_TOKEN }}
      - name: Check out forge-deploy (compose-e2e.yml)
        uses: actions/checkout@v4
        with:
          repository: armoryworks/forge-deploy
          path: forge-deploy

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # The full Docker stack is needed for Playwright to hit a real backend.
      # We pull the latest published images rather than building from scratch.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Brings up postgres + minio + forge-api (:5000) + forge-ui (:4200),
      # bound to 127.0.0.1. --wait blocks until every service is healthy, so
      # the suite never races a not-yet-ready backend.
      - name: Start backing services
        run: docker compose -f forge-deploy/compose-e2e.yml up -d --wait

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})
        run: npx playwright test --config=e2e/playwright.config.ts --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --reporter=blob

      - name: Stop backing services
        if: always()
        run: docker compose -f forge-deploy/compose-e2e.yml down -v

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

  merge-report:
    # Always run so a unified report is produced even when some shards failed.
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into one HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
