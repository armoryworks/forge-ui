# PR + push CI for qb-engineer-ui
#
# Runs on: every PR into develop or main, every push to develop or main.
# Steps: install, lint, build, unit test (Vitest).
# E2E (Playwright) is in nightly.yml — too slow for every PR.

name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

env:
  # Force JavaScript-based actions (checkout, etc.) to run on the runner's
  # Node.js 24 binary. Node 20 is deprecated on GitHub-hosted runners
  # (forced default June 2026, removed September 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint i18n keys
        # Catches the recurring "{key.path} renders raw because en.json is missing it"
        # bug class — tsc, ng build, and vitest all silently allow missing keys.
        # Allowlist: scripts/.lint-i18n-allow for dynamic / server-supplied keys.
        run: npm run lint:i18n

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm run test -- --watch=false

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
