# CodeQL static analysis for qb-engineer-ui
#
# Free for public repos. Scans for known vulnerability patterns in JS/TS.
# Findings appear in the Security tab.

name: CodeQL

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 6 * * 1'    # weekly Monday 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  # Force JavaScript-based actions (checkout, etc.) to run on the runner's
  # Node.js 24 binary. Node 20 is deprecated on GitHub-hosted runners
  # (forced default June 2026, removed September 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
