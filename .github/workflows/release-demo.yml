# Release workflow for the public demo SPA (forge-demo).
#
# Builds + pushes ghcr.io/armoryworks/forge-demo from forge-ui's
# Dockerfile.demo — the stubbed, API-less Angular bundle the demoApiInterceptor
# serves entirely from static JSON. This is what forge-deploy pulls + swaps on
# the UI box (FORGE_DEPLOY_SERVICES includes `demo`, COMPOSE_PROFILES includes
# `demo`), replacing the old hand-built save/load.
#
# amd64-only ON PURPOSE: the demo runs only on the amd64 UI box. The arm64
# customer box (Armory Plastics) never hosts the demo. If that ever changes,
# split this into per-arch + manifest like release-amd64/arm64/manifest.yml.
#
# Trigger model mirrors release-amd64.yml: daily 06:00 UTC schedule aggregates
# a day's commits into one image; workflow_dispatch and v*.*.* tags always
# build. The should-build guard short-circuits the scheduled run when HEAD's
# short sha is already published.

name: Release demo

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC daily
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: read

concurrency:
  group: release-demo-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/forge-demo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  should-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should: ${{ steps.check.outputs.should }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Decide
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=trigger=${{ github.event_name }} (non-schedule)" >> "$GITHUB_OUTPUT"
            echo "Non-schedule trigger — proceeding"
            exit 0
          fi
          short_sha=$(git rev-parse --short=7 HEAD)
          expected="main-${short_sha}"
          echo "Looking for prior image tag: forge-demo:${expected}"
          tags=$(gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/forge-demo/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || true)
          if echo "$tags" | grep -Fxq "$expected"; then
            echo "should=false" >> "$GITHUB_OUTPUT"
            echo "reason=already-published sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "Image for ${short_sha} already published — skipping scheduled build"
          else
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=new-commits-since-last-build sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "No prior image for ${short_sha} — proceeding"
          fi

  build-and-push:
    needs: should-build
    if: needs.should-build.outputs.should == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push demo image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.demo
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version || github.ref_name }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=demo
          cache-to: type=gha,scope=demo,mode=max
