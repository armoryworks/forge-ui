# Release workflow for forge-ui — amd64 leg.
#
# Builds + pushes linux/amd64 image to GHCR with the `-amd64` tag suffix
# (e.g. ghcr.io/armoryworks/forge-ui:latest-amd64). Native amd64 runner,
# no QEMU. Companion: release-arm64.yml. Manifest list (unsuffixed tags
# like `:latest`, `:X.Y.Z`) is created by release-manifest.yml after one
# or both per-arch workflows complete.
#
# Why split: the old single-workflow used a native arm64 runner and
# cross-built amd64 via QEMU. QEMU + Angular + apt installs blew build
# times to 17-25 min. Native amd64 brings that to ~4-6 min, and each
# arch can be re-triggered independently.

name: Release amd64

# Trigger model (2026-05-31, mirrors forge-api): daily 06:00 UTC schedule
# aggregates a day's commits into one image instead of per-push image
# bloat. workflow_dispatch and v*.*.* tag pushes always build. The
# `push: branches: main` trigger was removed; CI still runs on every
# push so test feedback stays fast. should-build guard short-circuits
# the scheduled run when HEAD's short sha is already published.
on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC daily
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: read

concurrency:
  group: release-amd64-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  should-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should: ${{ steps.check.outputs.should }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Decide
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=trigger=${{ github.event_name }} (non-schedule)" >> "$GITHUB_OUTPUT"
            echo "Non-schedule trigger — proceeding"
            exit 0
          fi
          short_sha=$(git rev-parse --short=7 HEAD)
          expected="main-${short_sha}-amd64"
          repo_name="${GITHUB_REPOSITORY##*/}"
          echo "Looking for prior image tag: ${expected}"
          tags=$(gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${repo_name}/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || true)
          if echo "$tags" | grep -Fxq "$expected"; then
            echo "should=false" >> "$GITHUB_OUTPUT"
            echo "reason=already-published sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "Image for ${short_sha} already published — skipping scheduled build"
          else
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=new-commits-since-last-build sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "No prior image for ${short_sha} — proceeding"
          fi

  test:
    needs: should-build
    if: needs.should-build.outputs.should == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests (Vitest)
        run: npm run test -- --watch=false

  build-and-push:
    needs: [should-build, test]
    if: needs.should-build.outputs.should == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (amd64-suffixed tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }}-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,suffix=-amd64,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},suffix=-amd64
            type=semver,pattern={{major}}.{{minor}},suffix=-amd64
            type=semver,pattern={{major}},suffix=-amd64

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version || github.ref_name }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
