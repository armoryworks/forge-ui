# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ────────────────────────────────────────────────────
    # nginx gotcha: `add_header` in a child scope (location block) causes ALL
    # parent-scope `add_header` directives to be ignored. Any location with its
    # own add_header MUST repeat the full security header set, or those headers
    # silently disappear. Server-level still applies to /api/, /hubs/,
    # /docuseal/ because those have no add_header of their own.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: 1-year max-age + includeSubDomains. Drop to a shorter window (e.g.
    # max-age=86400) during initial rollout if you're unsure about SSL stability.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # SPA fallback — never cache index.html so browsers always get fresh asset filenames
    location / {
        # Canonicalize: strip trailing slash on SPA paths so /foo/ and /foo aren't
        # two distinct URLs in browser history, the service-worker cache, analytics,
        # or any external referrer table. Regex requires at least one char before
        # the trailing slash, so root (/) is exempt automatically. Scoped to this
        # location, so /api/, /connect/, /.well-known/, etc. (handled by their own
        # location blocks) pass through untouched — important because some APIs
        # treat /foo/ and /foo as semantically distinct.
        rewrite ^(.+)/$ $1 permanent;

        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Explicit no-cache on index.html itself. Belt-and-suspenders — index.html is also
    # reached via the SPA fallback above which already sets these, but a direct request
    # for /index.html must NEVER be cached at the browser, intermediate proxy, or
    # service worker layer. The hashed JS/CSS bundles index.html references are immutable;
    # only the HTML that points at the current bundle hashes must be revalidated.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Service worker + its manifest must always be re-fetched so the SW update
    # check actually sees new versions. The static-asset regex below would otherwise
    # match ngsw-worker.js (`.js` suffix) and stamp it with `immutable, max-age=1y`,
    # which is the root cause of "browser keeps caching ancient SPA versions".
    location = /ngsw-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # Maintenance page — shown when API is unreachable (502/503/504)
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store" always;
    }

    # API proxy
    #
    # Uses a variable for proxy_pass so nginx defers DNS resolution to request time
    # instead of caching the api container's IP at startup. When the api container
    # is recreated (e.g., by `qb-deploy --service api`), the IP changes; without
    # `resolver` + variable form, nginx keeps proxying to the stale IP and the
    # error_page 502 serves a maintenance page even though the api is up.
    # 127.0.0.11 is Docker's embedded DNS resolver.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $api http://forge-api:8080;
        client_max_body_size 100m;
        # `proxy_pass $api;` (no path) is required when the upstream is a variable —
        # nginx skips URI substitution with variables, so any path on proxy_pass would
        # be appended verbatim to the request URI, producing /api/api/v1/... at the
        # upstream and a 404. With `$api;` (no path), nginx forwards $request_uri
        # unmodified (`/api/v1/...` stays `/api/v1/...`).
        proxy_pass $api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # SignalR hub proxy (WebSocket) — same deferred-resolver pattern as /api/.
    location /hubs/ {
        resolver 127.0.0.11 valid=30s;
        set $api http://forge-api:8080;
        # See note in /api/ block — variable proxy_pass needs no path.
        proxy_pass $api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # DocuSeal proxy
    location /docuseal/ {
        resolver 127.0.0.11 valid=30s;
        set $docuseal http://forge-signing:3000;
        proxy_pass $docuseal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable";
    }
}
