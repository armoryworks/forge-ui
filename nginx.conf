server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    # nginx gotcha: `add_header` in a child scope (location block) causes ALL
    # parent-scope `add_header` directives to be ignored. Any location that
    # has its own add_header MUST repeat the full security header set, or
    # those headers will silently disappear on responses from that location.
    # Server-level adds still apply to proxied locations (/api/, /hubs/,
    # /docuseal/, /logs) because those have no add_header of their own.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-z7oOGAfr6XW6YY4cAyS3riSSvrJRqpSi1fOF9vQ5SrI='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # SPA fallback — never cache index.html so browsers always get fresh asset filenames
    location / {
        # Canonicalize: strip trailing slash on SPA paths so /foo/ and /foo aren't
        # two distinct URLs in browser history, the service-worker cache, analytics,
        # or any external referrer table. Regex requires at least one char before
        # the trailing slash, so root (/) is exempt automatically. Scoped to this
        # location, so /api/, /connect/, /.well-known/, etc. (handled by their own
        # location blocks) pass through untouched — important because some APIs
        # treat /foo/ and /foo as semantically distinct.
        rewrite ^(.+)/$ $1 permanent;

        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-z7oOGAfr6XW6YY4cAyS3riSSvrJRqpSi1fOF9vQ5SrI='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Explicit no-cache on index.html itself. Belt-and-suspenders — index.html is also
    # reached via the SPA fallback above which already sets these, but a direct request
    # for /index.html must NEVER be cached at the browser, intermediate proxy, or
    # service worker layer. The hashed JS/CSS bundles index.html references are immutable;
    # only the HTML that points at the current bundle hashes must be revalidated.
    # Same triple-header set as the SPA fallback for parity.
    # Service worker (ngsw-worker.js) and its manifest (ngsw.json) are also covered here
    # since neither matches the immutable static-asset regex below.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-z7oOGAfr6XW6YY4cAyS3riSSvrJRqpSi1fOF9vQ5SrI='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Service worker + its manifest must always be re-fetched so the SW update
    # check actually sees new versions. The static-asset regex below would otherwise
    # match ngsw-worker.js (`.js` suffix) and stamp it with `immutable, max-age=1y`.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # Maintenance page — shown when API is unreachable (502/503/504)
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-z7oOGAfr6XW6YY4cAyS3riSSvrJRqpSi1fOF9vQ5SrI='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store" always;
    }

    # API proxy
    location /api/ {
        client_max_body_size 100m;
        proxy_pass http://qb-engineer-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # OIDC identity-provider surface (OpenIddict).
    # /connect/* covers authorize, token, userinfo, logout, register (RFC 7591),
    # and register/{clientId} (RFC 7592). Without this proxy block the SPA's
    # location / fallback returns index.html for GETs and 405 for POSTs, which
    # is what made discovery look "wired up" but registration silently fail.
    location /connect/ {
        client_max_body_size 1m;
        proxy_pass http://qb-engineer-api:8080/connect/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # OIDC discovery + JWKS. RFC 8414 / OpenID Connect Discovery 1.0 require
    # these to live at the issuer root, NOT under /api/, so they need their
    # own proxy rule. Currently only OpenIddict serves anything under
    # /.well-known/ — if a static .well-known file is ever needed later,
    # add an exact-match location above this prefix block.
    location /.well-known/ {
        proxy_pass http://qb-engineer-api:8080/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # SignalR hub proxy (WebSocket)
    location /hubs/ {
        proxy_pass http://qb-engineer-api:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # DocuSeal proxy — same-origin embedding of document signing forms.
    # DocuSeal is internal-only (qb-engineer-signing:3000); this proxy is the
    # sole browser-reachable path. The client-side JS embed and signing form
    # are both served from /docuseal/, keeping them same-origin with the app.
    #
    # Uses a variable for proxy_pass so nginx defers DNS resolution to request time.
    # This allows the container to start even when qb-engineer-signing is not running.
    location /docuseal/ {
        resolver 127.0.0.11 valid=30s;
        set $docuseal http://qb-engineer-signing:3000;
        proxy_pass $docuseal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Strip DocuSeal's own clickjacking headers — we embed it intentionally
        # through this same-origin proxy, so DocuSeal's DENY would block itself.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Seq log viewer proxy — optional logging container (qb-engineer-logs).
    # Seq runs with SEQ_PATHBASE=/logs so it expects the /logs/ prefix in all requests.
    # Uses deferred DNS resolution so nginx starts even when the container is off.
    # Seq has built-in authentication; no additional auth layer needed.
    # ^~ prevents the static asset regex from stealing Seq's JS/CSS files.
    location ^~ /logs {
        resolver 127.0.0.11 valid=30s;
        set $seq http://qb-engineer-logs:80;
        proxy_pass $seq;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Strip our security headers — Seq serves its own SPA
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-z7oOGAfr6XW6YY4cAyS3riSSvrJRqpSi1fOF9vQ5SrI='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable";
    }
}
