server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Demo site is fully static — no API, no SignalR, no DocuSeal, no Seq.
    # All data is synthesized in-browser from /demo-data/*.json by the
    # demoApiInterceptor. Any accidental /api/ or /hubs/ calls are short-
    # circuited client-side, so no upstream is needed here.

    # ── Security Headers ────────────────────────────────────────────────────
    # nginx gotcha: `add_header` in a child scope wipes out parent adds.
    # Every location that sets its own add_header repeats the full set.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip — JSON demo data benefits a lot; JS/CSS are already minified.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # SPA fallback — never cache index.html so fresh asset filenames win
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Demo data JSON — shortish cache. These are regenerated by the export
    # stack; if the static bundle is rebuilt with a new set, clients should
    # pick them up on their next visit rather than hours later.
    location /demo-data/ {
        expires 5m;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Hashed static assets — long immutable cache (Angular adds hashes
    # to filenames, so content-addressed caching is safe).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable";
    }
}
